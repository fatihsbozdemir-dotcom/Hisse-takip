name: KAP Haber Takip

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 7-18 * * 1-5"

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Python kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Kutuphane kur
        run: pip install requests beautifulsoup4

      - name: KAP botu calistir
        run: python kap_takip.py

      - name: Gorulenleri kaydet
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add kap_sent_ids.json
          git diff --staged --quiet || git commit -m "KAP sent_ids guncellendi"
          git push
