name: BIST Yatay Tarama Son

on:
  workflow_dispatch:
  schedule:
    - cron: "0 16 * * 1-5"  # Hafta içi 19:00 TR
jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Python kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Kütüphane kur
        run: pip install -r requirements.txt

      - name: Bot çalıştır
        run: python scanner.py
