name: EMA 4H Gunluk Tarama

on:
  workflow_dispatch: 
  schedule:
    - cron: '0 10 * * *' # Her gün TSİ 13:00 (UTC 10:00)

jobs:
  run-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Cek
        uses: actions/checkout@v3

      - name: Python Kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # Sürümü 3.10'a yükselttik

      - name: Paketleri Kur
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance requests mplfinance
          pip install pandas_ta --user # Kurulum hatasını önlemek için --user eklendi

      - name: Taramayi Calistir
        run: python ema_ozel_bot.py
