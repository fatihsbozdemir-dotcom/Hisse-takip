name: Haftalik Hisse Taramasi

on:
  schedule:
    # Her Cumartesi saat 07:00 UTC (TSİ 10:00)
    - cron: '0 7 * * 6'
  workflow_dispatch: # Manuel çalıştırmak için buton ekler

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu kopyala
        uses: actions/checkout@v3

      - name: Python Kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Kütüphaneleri Yükle
        run: |
          pip install yfinance pandas requests mplfinance

      - name: Kodu Çalıştır
        run: haftalık_düşenler.py
