name: Hisse Tarama Botu

on:
  schedule:
    # Borsa saatlerinde çalışır (UTC+3 = Türkiye)
    # UTC 07:00 = Türkiye 10:00
    - cron: '0 7 * * 1-5' # Her gün 10:00
    - cron: '0 9 * * 1-5' # Her gün 12:00
    - cron: '0 11 * * 1-5' # Her gün 14:00
    - cron: '0 14 * * 1-5' # Her gün 17:00
  workflow_dispatch: # Manuel çalıştırma butonu

jobs:
  tara:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu İndir
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Kütüphaneleri Yükle
        run: pip install -r requirements.txt

      - name: Taramayı Başlat
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scanner.py
